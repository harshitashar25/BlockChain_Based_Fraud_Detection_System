version: '3.8'

services:
  # AI Risk Engine (Python Flask)
  ai-risk-engine:
    build:
      context: ./ai-risk-engine
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LEA Backend (Node.js)
  lea-backend:
    build:
      context: ./lea-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"  # HTTP
      - "8082:8082"  # WebSocket
    environment:
      - NODE_ENV=production
    depends_on:
      - ai-risk-engine
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bank API (Spring Boot) - Bank A instance
  bank-api-a:
    build:
      context: ./bank-api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=banka
      - CORDA_RPC_HOST=host.docker.internal
      - CORDA_RPC_PORT=10006
      - CORDA_RPC_USERNAME=user1
      - CORDA_RPC_PASSWORD=test
      - AI_ENGINE_URL=http://ai-risk-engine:5001
      - LEA_BACKEND_URL=http://lea-backend:8080
    depends_on:
      - ai-risk-engine
      - lea-backend
    networks:
      - fraud-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Bank API (Spring Boot) - Bank B instance
  bank-api-b:
    build:
      context: ./bank-api
      dockerfile: Dockerfile
    ports:
      - "8083:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=bankb
      - CORDA_RPC_HOST=host.docker.internal
      - CORDA_RPC_PORT=10009
      - CORDA_RPC_USERNAME=user1
      - CORDA_RPC_PASSWORD=test
      - AI_ENGINE_URL=http://ai-risk-engine:5001
      - LEA_BACKEND_URL=http://lea-backend:8080
    depends_on:
      - ai-risk-engine
      - lea-backend
    networks:
      - fraud-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # LEA Frontend (React)
  lea-frontend:
    build:
      context: ./lea-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_WS_URL=ws://localhost:8082
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - lea-backend
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

# Note: Corda nodes should be run separately on the host machine
# as they require specific network configuration and cannot be easily containerized
# without additional setup for RPC access.

